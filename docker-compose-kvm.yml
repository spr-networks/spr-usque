services:
  spr-usque:
    extends:
      file: docker-compose.yml
      service: spr-usque
    image: ghcr.io/spr-networks/spr-usque:${RELEASE_VERSION:-latest}${RELEASE_CHANNEL:--krun}
    runtime: ${SPR_KRUN_RUNTIME:-spr-krun}
    sysctls: !reset []
    annotations:
      krun.cpus: "${SPR_KRUN_CPUS:-1}"
      krun.ram_mib: "${SPR_KRUN_RAM_MIB:-128}"
      krun.tap_name: "kruntap0"
      krun.net_uplink: "eth0"
      krun.net_mac: "${SPR_KRUN_MAC:-02:53:50:52:4b:12}"
      krun.vsock_path: "/state/plugins/spr-usque/socket"
      krun.vsock_port: "4040"
    environment:
      SPR_KRUN_PLUGIN_SOCKET: "/run/spr-krun-plugin/spr-usque.sock"
      SPR_KRUN_VSOCK_PORT: "4040"
    devices:
      - "/dev/net/tun:/dev/net/tun"

networks:
  usquenet:
    name: spr-usque
    driver_opts:
      com.docker.network.bridge.name: spr-usque
    ipam:
      config:
        - subnet: 172.30.118.0/24
